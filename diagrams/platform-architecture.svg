<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 450" role="img">
  <title>Memphis 311 AI Platform Architecture</title>
  <desc>Three-layer architecture diagram showing City Departments connecting to Shared Azure AI Services and Operations infrastructure for the Memphis 311 AI Platform.</desc>

  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0E0E0E"/>
      <stop offset="100%" stop-color="#080808"/>
    </linearGradient>
    <linearGradient id="containerGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E1E1E"/>
      <stop offset="100%" stop-color="#141414"/>
    </linearGradient>
    <linearGradient id="arrowGradV" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#555"/>
      <stop offset="100%" stop-color="#444"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-opacity="0.5"/>
    </filter>
    <marker id="arrowDash" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555"/>
    </marker>
    <marker id="arrowSolid" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8DC63F"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="450" fill="url(#bgGrad)"/>

  <!-- === TOP LAYER: City Departments === -->
  <text x="30" y="28" font-family="Syne, Calibri, sans-serif" font-size="13" font-weight="bold" fill="#FFBF3B">City Departments</text>

  <!-- Department boxes -->
  <g filter="url(#shadow)">
    <!-- Public Works -->
    <rect x="30" y="40" width="130" height="52" rx="4" fill="url(#containerGrad)" stroke="#333" stroke-width="1"/>
    <rect x="30" y="40" width="4" height="52" rx="2" fill="#FFBF3B"/>
    <text x="42" y="58" font-family="Syne, Calibri, sans-serif" font-size="10" font-weight="bold" fill="#FFBF3B">Public Works</text>
    <text x="42" y="72" font-family="Source Sans 3, Calibri, sans-serif" font-size="9" fill="#CCC">Potholes, roads</text>

    <!-- Code Enforcement -->
    <rect x="172" y="40" width="130" height="52" rx="4" fill="url(#containerGrad)" stroke="#333" stroke-width="1"/>
    <rect x="172" y="40" width="4" height="52" rx="2" fill="#FFBF3B"/>
    <text x="184" y="58" font-family="Syne, Calibri, sans-serif" font-size="10" font-weight="bold" fill="#FFBF3B">Code Enforcement</text>
    <text x="184" y="72" font-family="Source Sans 3, Calibri, sans-serif" font-size="9" fill="#CCC">Violations</text>

    <!-- Parks & Rec -->
    <rect x="314" y="40" width="130" height="52" rx="4" fill="url(#containerGrad)" stroke="#333" stroke-width="1"/>
    <rect x="314" y="40" width="4" height="52" rx="2" fill="#FFBF3B"/>
    <text x="326" y="58" font-family="Syne, Calibri, sans-serif" font-size="10" font-weight="bold" fill="#FFBF3B">Parks &amp; Rec</text>
    <text x="326" y="72" font-family="Source Sans 3, Calibri, sans-serif" font-size="9" fill="#CCC">Facilities</text>

    <!-- Police -->
    <rect x="456" y="40" width="130" height="52" rx="4" fill="url(#containerGrad)" stroke="#333" stroke-width="1"/>
    <rect x="456" y="40" width="4" height="52" rx="2" fill="#FFBF3B"/>
    <text x="468" y="58" font-family="Syne, Calibri, sans-serif" font-size="10" font-weight="bold" fill="#FFBF3B">Police</text>
    <text x="468" y="72" font-family="Source Sans 3, Calibri, sans-serif" font-size="9" fill="#CCC">Noise, safety</text>

    <!-- Utilities -->
    <rect x="598" y="40" width="130" height="52" rx="4" fill="url(#containerGrad)" stroke="#333" stroke-width="1"/>
    <rect x="598" y="40" width="4" height="52" rx="2" fill="#FFBF3B"/>
    <text x="610" y="58" font-family="Syne, Calibri, sans-serif" font-size="10" font-weight="bold" fill="#FFBF3B">Utilities</text>
    <text x="610" y="72" font-family="Source Sans 3, Calibri, sans-serif" font-size="9" fill="#CCC">Water, sewer</text>

    <!-- General Services -->
    <rect x="740" y="40" width="130" height="52" rx="4" fill="url(#containerGrad)" stroke="#333" stroke-width="1"/>
    <rect x="740" y="40" width="4" height="52" rx="2" fill="#FFBF3B"/>
    <text x="752" y="58" font-family="Syne, Calibri, sans-serif" font-size="10" font-weight="bold" fill="#FFBF3B">General Services</text>
    <text x="752" y="72" font-family="Source Sans 3, Calibri, sans-serif" font-size="9" fill="#CCC">Other</text>
  </g>

  <!-- Dashed arrows from departments to middle container -->
  <line x1="95" y1="92" x2="95" y2="140" stroke="#555" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowDash)"/>
  <line x1="237" y1="92" x2="237" y2="140" stroke="#555" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowDash)"/>
  <line x1="379" y1="92" x2="379" y2="140" stroke="#555" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowDash)"/>
  <line x1="521" y1="92" x2="521" y2="140" stroke="#555" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowDash)"/>
  <line x1="663" y1="92" x2="663" y2="140" stroke="#555" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowDash)"/>
  <line x1="805" y1="92" x2="805" y2="140" stroke="#555" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowDash)"/>

  <!-- === MIDDLE LAYER: Shared Azure AI Services === -->
  <!-- Large container (label INSIDE, not above, to avoid arrow overlap) -->
  <rect x="30" y="140" width="840" height="150" rx="6" fill="#1A1A1A" stroke="#333" stroke-width="1.5"/>
  <text x="45" y="158" font-family="Syne, Calibri, sans-serif" font-size="13" font-weight="bold" fill="#2D5A94">Shared Azure AI Services</text>

  <!-- Service boxes inside container - Row 1 -->
  <g filter="url(#shadow)">
    <!-- Azure OpenAI -->
    <rect x="50" y="170" width="250" height="46" rx="4" fill="url(#containerGrad)" stroke="#333" stroke-width="1"/>
    <rect x="50" y="170" width="4" height="46" rx="2" fill="#2D5A94"/>
    <text x="63" y="188" font-family="Syne, Calibri, sans-serif" font-size="11" font-weight="bold" fill="#2D5A94">Azure OpenAI</text>
    <text x="63" y="204" font-family="Source Sans 3, Calibri, sans-serif" font-size="9" fill="#CCC">GPT-4o, GPT-4o-mini, embeddings</text>

    <!-- AI Language -->
    <rect x="320" y="170" width="250" height="46" rx="4" fill="url(#containerGrad)" stroke="#333" stroke-width="1"/>
    <rect x="320" y="170" width="4" height="46" rx="2" fill="#2D5A94"/>
    <text x="333" y="188" font-family="Syne, Calibri, sans-serif" font-size="11" font-weight="bold" fill="#2D5A94">AI Language</text>
    <text x="333" y="204" font-family="Source Sans 3, Calibri, sans-serif" font-size="9" fill="#CCC">PII, sentiment, key phrases, CLU</text>

    <!-- Content Safety -->
    <rect x="590" y="170" width="265" height="46" rx="4" fill="url(#containerGrad)" stroke="#333" stroke-width="1"/>
    <rect x="590" y="170" width="4" height="46" rx="2" fill="#2D5A94"/>
    <text x="603" y="188" font-family="Syne, Calibri, sans-serif" font-size="11" font-weight="bold" fill="#2D5A94">Content Safety</text>
    <text x="603" y="204" font-family="Source Sans 3, Calibri, sans-serif" font-size="9" fill="#CCC">Harm detection</text>
  </g>

  <!-- Service boxes inside container - Row 2 -->
  <g filter="url(#shadow)">
    <!-- Document Intelligence -->
    <rect x="50" y="228" width="250" height="46" rx="4" fill="url(#containerGrad)" stroke="#333" stroke-width="1"/>
    <rect x="50" y="228" width="4" height="46" rx="2" fill="#2D5A94"/>
    <text x="63" y="246" font-family="Syne, Calibri, sans-serif" font-size="11" font-weight="bold" fill="#2D5A94">Document Intelligence</text>
    <text x="63" y="262" font-family="Source Sans 3, Calibri, sans-serif" font-size="9" fill="#CCC">Form OCR, prebuilt models</text>

    <!-- AI Search -->
    <rect x="320" y="228" width="250" height="46" rx="4" fill="url(#containerGrad)" stroke="#333" stroke-width="1"/>
    <rect x="320" y="228" width="4" height="46" rx="2" fill="#2D5A94"/>
    <text x="333" y="246" font-family="Syne, Calibri, sans-serif" font-size="11" font-weight="bold" fill="#2D5A94">AI Search</text>
    <text x="333" y="262" font-family="Source Sans 3, Calibri, sans-serif" font-size="9" fill="#CCC">Indexing, vector search, RAG</text>

    <!-- Speech Services -->
    <rect x="590" y="228" width="265" height="46" rx="4" fill="url(#containerGrad)" stroke="#333" stroke-width="1"/>
    <rect x="590" y="228" width="4" height="46" rx="2" fill="#2D5A94"/>
    <text x="603" y="246" font-family="Syne, Calibri, sans-serif" font-size="11" font-weight="bold" fill="#2D5A94">Speech Services</text>
    <text x="603" y="262" font-family="Source Sans 3, Calibri, sans-serif" font-size="9" fill="#CCC">Speech-to-text, translation</text>
  </g>

  <!-- Solid arrows from middle to bottom -->
  <line x1="250" y1="290" x2="250" y2="330" stroke="#8DC63F" stroke-width="1.5" marker-end="url(#arrowSolid)"/>
  <line x1="450" y1="290" x2="450" y2="330" stroke="#8DC63F" stroke-width="1.5" marker-end="url(#arrowSolid)"/>
  <line x1="650" y1="290" x2="650" y2="330" stroke="#8DC63F" stroke-width="1.5" marker-end="url(#arrowSolid)"/>

  <!-- === BOTTOM LAYER: Operations === -->
  <!-- Container with label INSIDE -->
  <rect x="30" y="330" width="840" height="80" rx="6" fill="#1A1A1A" stroke="#333" stroke-width="0.5"/>
  <text x="45" y="348" font-family="Syne, Calibri, sans-serif" font-size="13" font-weight="bold" fill="#8DC63F">Operations</text>

  <g filter="url(#shadow)">
    <!-- Auth & RBAC -->
    <rect x="50" y="355" width="240" height="46" rx="4" fill="url(#containerGrad)" stroke="#333" stroke-width="1"/>
    <rect x="50" y="355" width="4" height="46" rx="2" fill="#8DC63F"/>
    <text x="64" y="373" font-family="Syne, Calibri, sans-serif" font-size="11" font-weight="bold" fill="#8DC63F">Auth &amp; RBAC</text>
    <text x="64" y="389" font-family="Source Sans 3, Calibri, sans-serif" font-size="9" fill="#CCC">Cognitive Services User</text>

    <!-- Azure Monitor -->
    <rect x="320" y="355" width="240" height="46" rx="4" fill="url(#containerGrad)" stroke="#333" stroke-width="1"/>
    <rect x="320" y="355" width="4" height="46" rx="2" fill="#8DC63F"/>
    <text x="334" y="373" font-family="Syne, Calibri, sans-serif" font-size="11" font-weight="bold" fill="#8DC63F">Azure Monitor</text>
    <text x="334" y="389" font-family="Source Sans 3, Calibri, sans-serif" font-size="9" fill="#CCC">Metrics + alerts</text>

    <!-- Cost Management -->
    <rect x="590" y="355" width="265" height="46" rx="4" fill="url(#containerGrad)" stroke="#333" stroke-width="1"/>
    <rect x="590" y="355" width="4" height="46" rx="2" fill="#8DC63F"/>
    <text x="604" y="373" font-family="Syne, Calibri, sans-serif" font-size="11" font-weight="bold" fill="#8DC63F">Cost Management</text>
    <text x="604" y="389" font-family="Source Sans 3, Calibri, sans-serif" font-size="9" fill="#CCC">Budget thresholds</text>
  </g>

  <!-- Tech901 AI-102 badge -->
  <g opacity="0.6">
    <rect x="790" y="420" width="100" height="20" rx="4" fill="#1A1A1A" stroke="#333" stroke-width="1"/>
    <text x="840" y="434" font-family="Syne, Calibri, sans-serif" font-size="8" font-weight="bold" fill="#FFBF3B" text-anchor="middle">Tech901 AI-102</text>
  </g>
</svg>
