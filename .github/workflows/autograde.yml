name: Autograding
on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Make the activity root importable so `from app.xxx import ...` resolves
  # whether student code is run as a script (`python app/main.py`) or as a
  # module (`python -m app.main`). Without this, absolute-package imports
  # like `from app.schemas import VALID_CATEGORIES` raise ModuleNotFoundError
  # when the script is invoked directly, because Python only puts the script's
  # own directory (app/) on sys.path, not the repository root. See Activity 3
  # and Activity 7 incident, 2026-04-14.
  PYTHONPATH: ${{ github.workspace }}
  STUDENT_CORPUS_SEED: ${{ github.actor }}

jobs:
  grade:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write .env file for autograder
        shell: bash
        run: |
          {
            echo "STUDENT_CORPUS_SEED=$STUDENT_CORPUS_SEED"
          } > .env

      - name: Run student code
        run: python app/main.py
        continue-on-error: true

      - name: Clone autograder
        uses: actions/checkout@v4
        with:
          repository: Tech901/ai102-autograder-tests
          token: ${{ secrets.AUTOGRADER_PAT }}
          path: .autograder

      # --- 26 tests, 100 points ---
      - name: "test_student_modified_architecture_decisions"
        id: test1
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: "test_student_modified_architecture_decisions"
          command: "python -m pytest .autograder/activity02-architect-platform/test_hidden.py::test_student_modified_architecture_decisions -v --tb=short"
          timeout: "5"
          max-score: "4"

      - name: "test_student_wrote_endpoint_regex"
        id: test2
